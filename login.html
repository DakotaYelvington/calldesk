<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallDesk - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-box">
    <div class="logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="black">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
        </svg>
      </div>
      <div class="logo-text">Call<span>Desk</span></div>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your account</p>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>

    <button class="login-btn" onclick="login()">Sign In</button>

    <div class="error" id="error">Incorrect username or password</div>
  </div>

  <script>
    // Check if already logged in
    const token = sessionStorage.getItem("token")
    if (token) {
      window.location.href = "dashboard.html"
    }

    function login() {
      const username = document.getElementById("username").value
      const password = document.getElementById("password").value

      if (!username || !password) {
        showError("Please enter your username and password")
        return
      }

      fetch("http://localhost:8000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      })
      .then(response => response.json())
      .then(data => {
        if (data.token) {
          // Save token to session storage
          sessionStorage.setItem("token", data.token)
          sessionStorage.setItem("username", data.username)
          sessionStorage.setItem("business_name", data.business_name)

          // Redirect to dashboard
          window.location.href = "dashboard.html"
        } else {
          showError("Incorrect username or password")
        }
      })
      .catch(() => {
        showError("Could not connect to server")
      })
    }

    function showError(msg) {
      const err = document.getElementById("error")
      err.textContent = msg
      err.classList.add("show")
    }

    // Allow pressing Enter to login
    document.addEventListener("keypress", function(e) {
      if (e.key === "Enter") login()
    })
  </script>
</body>
</html>
